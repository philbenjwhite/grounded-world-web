<!DOCTYPE html>
<!--
  ============================================================
  GAIA CHAT UI — Engineer Handoff (Standalone Preview)
  ============================================================
  This file is a static HTML preview of the GaiaChat React
  component. It mirrors the structure and classes used in
  GaiaChat.tsx + GaiaChat.module.css so engineers can preview
  the UI in a browser and use it as a reference for the
  iframe/embed integration.

  FILES
  -----
  - GaiaChat.tsx            — React component (production)
  - GaiaChat.module.css     — CSS Modules styles (production)
  - gaia-chat-handoff.html  — THIS FILE (reference for iframe)
  - gaia-chat-handoff.css   — Standalone CSS for this reference

  DESIGN
  ------
  - Dark background (#0B0A0A), seamless with host page
  - iOS-style frosted glass bubbles (backdrop-filter blur)
  - Gaia avatar (28px circle) + "Gaia" label on bot messages
  - User messages: blue-tinted glass, right-aligned, no avatar
  - Input: glass pill with cyan focus ring
  - Hidden scrollbar, top/bottom fade overlays on messages

  INTEGRATION NOTES
  -----------------
  1. The avatar image src (/images/gaia-ai.png) should point
     to the actual hosted asset URL in the iframe context.

  2. The stub JS at the bottom (send/appendBot/appendUser)
     should be replaced with the actual Gaia backend API call.

  3. The send button uses an inline SVG (Phosphor ArrowUp).
     If using Phosphor Icons library, replace with the component.

  4. Backdrop-filter requires a transparent/semi-transparent
     parent background to be visible. The dark bg + glass
     bubbles create the frosted effect.

  5. The disclaimer footer text can be customized as needed.
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gaia Chat — Engineer Handoff Preview</title>
  <link rel="stylesheet" href="gaia-chat-handoff.css"/>
</head>
<body>

  <div class="chat-shell">
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">

      <!-- Messages area -->
      <div class="messages-wrap">
        <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">

          <!-- Initial bot message -->
          <div class="msg-row bot">
            <div class="msg-sender">
              <div class="msg-avatar">
                <img src="/images/gaia-ai.png" alt="Gaia" width="28" height="28"/>
              </div>
              <span class="msg-sender-name">Gaia</span>
            </div>
            <div class="msg-bubble">
              What would you like to know?
            </div>
          </div>

        </div>
      </div>

      <!-- Input bar -->
      <div class="input-area">
        <div class="input-row">
          <input
            class="msg-input"
            id="msgInput"
            type="text"
            placeholder="Ask Gaia anything..."
            autocomplete="off"
            aria-label="Type a message"
          />
          <button class="send-btn" id="sendBtn" aria-label="Send message">
            <!-- Phosphor ArrowUp icon (bold) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256">
              <path d="M208.49,152.49a12,12,0,0,1-17,0L140,101v99a12,12,0,0,1-24,0V101L64.49,152.49a12,12,0,0,1-17-17l80-80a12,12,0,0,1,17,0l80,80A12,12,0,0,1,208.49,152.49Z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Footer disclaimer -->
      <footer class="footer-disclaimer">
        <p>Gaia may make mistakes. Verify important information.</p>
      </footer>

    </div>
  </div>


  <!--
    STUB JS — DOM-only interactions for preview.
    Replace setTimeout in send() with actual API call in production.
  -->
  <script>
    const msgs = document.getElementById('messages');
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');

    /* Toggle send button active state based on input */
    input.addEventListener('input', function() {
      sendBtn.classList.toggle('active', input.value.trim().length > 0);
    });

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') send(); });

    function send() {
      var txt = input.value.trim();
      if (!txt) return;
      input.value = '';
      sendBtn.classList.remove('active');

      appendUser(txt);

      /* Typing indicator */
      var thinkEl = document.createElement('div');
      thinkEl.className = 'msg-thinking';
      thinkEl.innerHTML =
        '<div class="msg-sender">' +
          '<div class="msg-avatar">' +
            '<img src="/images/gaia-ai.png" alt="" width="28" height="28"/>' +
          '</div>' +
          '<span class="msg-sender-name">Gaia</span>' +
        '</div>' +
        '<div class="think-dots" aria-label="Gaia is typing">' +
          '<span></span><span></span><span></span>' +
        '</div>';
      msgs.appendChild(thinkEl);
      msgs.scrollTop = msgs.scrollHeight;

      /*
       * REPLACE THIS BLOCK with your actual API call:
       *   const res  = await fetch('/api/gaia', { method:'POST', body: JSON.stringify({ message: txt }) });
       *   const data = await res.json();
       *   thinkEl.remove();
       *   appendBot(data.reply);
       */
      setTimeout(function() {
        thinkEl.remove();
        appendBot(
          'Thanks for reaching out! At Grounded World we help purpose-driven ' +
          'organizations amplify their impact through research, strategy, and activation. ' +
          'Ask me anything about sustainability, B Corp certification, or how we can support your mission.'
        );
        msgs.scrollTop = msgs.scrollHeight;
      }, 1800);
    }

    function appendBot(text) {
      var row = document.createElement('div');
      row.className = 'msg-row bot';
      row.innerHTML =
        '<div class="msg-sender">' +
          '<div class="msg-avatar">' +
            '<img src="/images/gaia-ai.png" alt="Gaia" width="28" height="28"/>' +
          '</div>' +
          '<span class="msg-sender-name">Gaia</span>' +
        '</div>' +
        '<div class="msg-bubble">' + esc(text) + '</div>';
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendUser(text) {
      var row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML =
        '<div class="msg-bubble">' + esc(text) + '</div>';
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function esc(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
